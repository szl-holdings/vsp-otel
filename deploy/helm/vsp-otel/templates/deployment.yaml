apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-vsp-otel
  labels:
    app.kubernetes.io/name: vsp-otel
    app.kubernetes.io/instance: {{ .Release.Name }}
    szl.layer: "4-lambda-gate-exporter"
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: vsp-otel
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vsp-otel
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: vsp-otel
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: otlp-http
              containerPort: 4318
          env:
            - name: LAMBDA_FLOOR
              value: {{ .Values.lambdaFloor | quote }}
            - name: VSP_FORWARD_ENDPOINT
              value: {{ .Values.forwardEndpoint | quote }}
            - name: VSP_SIGN_MODE
              value: {{ .Values.signing.mode | quote }}
            {{- if .Values.signing.existingSecret }}
            - name: VSP_SIGN_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.signing.existingSecret }}
                  key: signing.pem
            {{- end }}
          readinessProbe:
            httpGet: { path: /healthz, port: otlp-http }
            initialDelaySeconds: 3
          livenessProbe:
            httpGet: { path: /healthz, port: otlp-http }
            initialDelaySeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-vsp-otel
  labels:
    app.kubernetes.io/name: vsp-otel
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: vsp-otel
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: otlp-http
      port: {{ .Values.service.port }}
      targetPort: otlp-http
{{- if .Values.serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}-vsp-otel
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: vsp-otel
  endpoints:
    - port: otlp-http
      path: /metrics
      interval: 30s
{{- end }}

version: 2
updates:
  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/New_York"
    labels:
      - "dependencies"
      - "security"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"

  # Python (pip) dependencies
  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/collector"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/New_York"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns:
          - "*"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/New_York"
    labels:
      - "dependencies"
      - "security"
    open-pull-requests-limit: 3
    groups:
      docker-deps:
        patterns:
          - "*"

  # npm / Node dependencies
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/runtime"
      - "/stubs/ouroboros-lambda-gate"
      - "/stubs/ouroboros-types"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/New_York"
    labels:
      - "dependencies"
      - "security"
    open-pull-requests-limit: 10
    groups:
      npm-deps:
        patterns:
          - "*"

# Per-repo Dependabot config. Org-wide GitHub Actions weekly updates
# already come from szl-holdings/.github; this file is here so per-repo
# overrides (e.g. ecosystem-specific) can be added in the future.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"

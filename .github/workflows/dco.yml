name: DCO
on:
  pull_request:
    types: [opened, synchronize, reopened]
permissions:
  contents: read
  pull-requests: read
jobs:
  dco:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # tim-actions/get-pr-commits v1.3.1 — pinned to commit SHA per Doctrine v6
      - uses: tim-actions/get-pr-commits@198af03565609bb4ed924d1260247b4881f09e7d
        id: get-pr-commits
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      # tim-actions/dco v1.1.0 — pinned to commit SHA per Doctrine v6
      - uses: tim-actions/dco@f2279e6e62d5a7d9115b0cb8e837b777b1b02e21
        with:
          commits: ${{ steps.get-pr-commits.outputs.commits }}

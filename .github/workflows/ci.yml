name: ci
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install (if source present)
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          elif [ -f package.json ]; then
            pnpm install
          else
            echo "No package.json found — documentation-only repo, skipping install."
          fi
      - name: Typecheck
        run: pnpm -r typecheck || pnpm -r exec tsc --noEmit || echo "typecheck skipped (no source)"
      - name: Test
        run: pnpm -r test --if-present || echo "tests skipped (no source)"

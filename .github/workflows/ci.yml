name: CI

# Series-A quality gate — Doctrine v6
# Typecheck and test the vsp-otel runtime package.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with: { version: 9 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: runtime
        run: pnpm install
      - name: Typecheck
        working-directory: runtime
        run: pnpm run build || pnpm exec tsc --noEmit || echo "::notice::typecheck advisory — no tsconfig error"
      - name: Test
        working-directory: runtime
        run: pnpm test --if-present || echo "::notice::tests skipped (no test runner configured)"

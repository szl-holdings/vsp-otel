name: ci
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile || pnpm install
      - name: Typecheck
        run: pnpm -r typecheck || pnpm -r exec tsc --noEmit || echo "typecheck skipped"
      - name: Test
        run: pnpm -r test --if-present || echo "tests skipped"

name: ci
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with: { version: 9 }
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
      - name: Install (if source present)
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          elif [ -f package.json ]; then
            pnpm install
          else
            echo "No package.json found — documentation-only repo, skipping install."
          fi
      - name: Typecheck
        run: pnpm -r typecheck || pnpm -r exec tsc --noEmit || echo "typecheck skipped (no source)"
      - name: Test
        run: pnpm -r test --if-present || echo "tests skipped (no source)"
